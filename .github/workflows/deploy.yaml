name: Remote Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ---------------------------
      # 1️⃣ Checkout code
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # 2️⃣ SSH to server & deploy
      # ---------------------------
      - name: Remote deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 10m
          script: |
            set -e

            echo "🔹 Load NVM and Node"
            export NVM_DIR="/root/.nvm"   # replace with actual NVM path
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm install 22
            nvm use 22

            echo "🔹 Go to frontend folder"
            cd /root/warranty/frontend     # replace with actual path

            echo "🔹 Ensure .env exists"
            if [ ! -f .env ]; then
              echo "❌ .env file not found! Copying production version..."
              cp .env.production .env     # adjust if your prod .env has a different name
            fi

            echo "🔹 Pull latest code"
            git fetch --all
            git reset --hard origin/main

            echo "🔹 Install dependencies"
            npm ci

            echo "🔹 Build frontend"
            npm run build

            echo "🔹 Verify build output"
            if [ ! -d "dist" ]; then
              echo "❌ Build failed: 'dist' directory not found!"
              exit 1
            fi

            echo "🔹 Deploy to Nginx"
            rm -rf /var/www/warranty-frontend/*
            mkdir -p /var/www/warranty-frontend
            cp -r dist/* /var/www/warranty-frontend/

            echo "🔹 Reload Nginx"
            systemctl reload nginx

            echo "✅ Frontend deployed successfully!"
